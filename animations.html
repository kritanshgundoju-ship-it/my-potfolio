<!DOCTYPE html>
<html>
<head>
<title>CSS Animations</title>
<style>
body { background: #f0f4ff; font-family: Arial; display: flex; justify-content: center; padding: 40px; }
.card { background: white; padding: 40px; border-radius: 16px; width: 380px; text-align: center; }
h1 { color: #4a90e2; }

/* Animation 1 — bouncing ball */
.ball {
  width: 60px;
  height: 60px;
  background: #4a90e2;
  border-radius: 50%;
  margin: 20px auto;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-60px); }
  100% { transform: translateY(0); }
}

/* Animation 2 — color changing box */
.colorbox {
  width: 100px;
  height: 100px;
  border-radius: 12px;
  margin: 20px auto;
  animation: colorchange 3s infinite;
}

@keyframes colorchange {
  0%   { background: #4a90e2; }
  33%  { background: #e24a4a; }
  66%  { background: #4ae24a; }
  100% { background: #4a90e2; }
}

/* Animation 3 — spinning loader */
.spinner {
  width: 50px;
  height: 50px;
  border: 6px solid #e0e0e0;
  border-top: 6px solid #4a90e2;
  border-radius: 50%;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Animation 4 — fading text */
.fadetext {
  font-size: 22px;
  font-weight: bold;
  color: #4a90e2;
  animation: fade 2s infinite;
}

@keyframes fade {
  0%   { opacity: 1; }
  50%  { opacity: 0; }
  100% { opacity: 1; }
}
</style>
</head>
<body>
<div class="card">
  <h1>CSS Animations</h1>

  <p>Bouncing ball:</p>
  <div class="ball"></div>

  <p>Color changing box:</p>
  <div class="colorbox"></div>

  <p>Spinning loader:</p>
  <div class="spinner"></div>

  <p>Fading text:</p>
  <div class="fadetext">Hello World!</div>
</div>
</body>
</html>
