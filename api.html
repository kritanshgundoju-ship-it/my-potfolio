<!DOCTYPE html>
<html>
<head>
<title>Joke API</title>
<style>
body { background: #f0f4ff; font-family: Arial; display: flex; justify-content: center; padding: 40px; }
.card { background: white; padding: 40px; border-radius: 16px; width: 400px; text-align: center; }
h1 { color: #4a90e2; }
#joke { font-size: 18px; color: #333; line-height: 1.6; margin: 20px 0; min-height: 80px; }
button { background: #4a90e2; color: white; padding: 10px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
button:hover { background: #2c6db5; transform: scale(1.05); }
#loading { color: #aaa; font-size: 15px; }
</style>
</head>
<body>
<div class="card">
  <h1>Joke Fetcher 😄</h1>
  <p id="joke">Click the button to get a joke from the internet!</p>
  <p id="loading"></p>
  <button onclick="getJoke()">Get Joke!</button>
</div>

<script>
function getJoke() {
  document.getElementById("loading").innerHTML = "Loading...";
  document.getElementById("joke").innerHTML = "";

  fetch("https://official-joke-api.appspot.com/random_joke")
    .then(response => response.json())
    .then(data => {
      document.getElementById("joke").innerHTML =
        "<b>" + data.setup + "</b><br><br>" + data.punchline;
      document.getElementById("loading").innerHTML = "";
    });
}
</script>

</body>
</html>
