<!DOCTYPE html>
<html>
<head>
<title>Country Info</title>
<style>
body { background: #f0f4ff; font-family: Arial; display: flex; justify-content: center; padding: 40px; }
.card { background: white; padding: 40px; border-radius: 16px; width: 420px; text-align: center; }
h1 { color: #4a90e2; }
.input-row { display: flex; gap: 8px; margin-bottom: 20px; }
input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; }
button { background: #4a90e2; color: white; padding: 10px 18px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: all 0.3s; }
button:hover { background: #2c6db5; }
#flag { font-size: 80px; margin: 10px 0; }
#countryName { font-size: 28px; font-weight: bold; color: #333; }
#info { font-size: 15px; color: #555; line-height: 2.2; margin-top: 16px; text-align: left; }
#error { color: #e24a4a; font-size: 15px; margin-top: 10px; }
#result { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Country Info 🌍</h1>
  <div class="input-row">
    <input type="text" id="countryInput" placeholder="Enter country name...">
    <button onclick="getCountry()">Search</button>
  </div>
  <div id="result">
    <p id="flag"></p>
    <p id="countryName"></p>
    <div id="info"></div>
  </div>
  <p id="error"></p>
</div>

<script>
function getCountry() {
  let country = document.getElementById("countryInput").value;

  if (country == "") {
    alert("Please enter a country name!");
    return;
  }

  document.getElementById("error").innerHTML = "";
  document.getElementById("result").style.display = "none";

  fetch("https://restcountries.com/v3.1/name/" + country)
    .then(response => response.json())
    .then(data => {
      if (data.status == 404) {
        document.getElementById("error").innerHTML = "Country not found! Try again.";
        return;
      }

      let c = data[0];
      let currencies = Object.values(c.currencies)[0].name;
      let languages = Object.values(c.languages).join(", ");

      document.getElementById("flag").innerHTML = c.flag;
      document.getElementById("countryName").innerHTML = c.name.common;
      document.getElementById("info").innerHTML =
        "🌐 Region: " + c.region + "<br>" +
        "🏙️ Capital: " + c.capital[0] + "<br>" +
        "👥 Population: " + c.population.toLocaleString() + "<br>" +
        "💰 Currency: " + currencies + "<br>" +
        "🗣️ Languages: " + languages + "<br>" +
        "📐 Area: " + c.area.toLocaleString() + " km²";

      document.getElementById("result").style.display = "block";
    });
}
</script>

</body>
</html>
