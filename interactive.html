<!DOCTYPE html>
<html>
<head>
<title>Interactive Card</title>
<style>
body { background: #f0f4ff; font-family: Arial; display: flex; justify-content: center; padding: 40px; }
.card {
  background: white;
  padding: 40px;
  border-radius: 16px;
  width: 360px;
  text-align: center;
  transition: all 0.3s;
}
.card:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
h1 { color: #4a90e2; }

.circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #4a90e2;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  cursor: pointer;
  transition: all 0.3s;
  animation: pulse 2s infinite;
}

.circle:hover {
  transform: scale(1.2);
  animation: none;
}

@keyframes pulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.btn {
  background: #4a90e2;
  color: white;
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  margin: 6px;
  transition: all 0.3s;
}
.btn:hover { transform: scale(1.1); background: #2c6db5; }

#message {
  font-size: 20px;
  font-weight: bold;
  color: #4a90e2;
  margin: 16px 0;
  min-height: 30px;
  transition: all 0.3s;
}

#score {
  font-size: 16px;
  color: #888;
}
</style>
</head>
<body>
<div class="card">
  <h1>Click the Circle!</h1>
  <div class="circle" onclick="clickCircle()" id="circle">🎯</div>
  <p id="message">Click the circle to start!</p>
  <p id="score">Score: 0</p>
  <button class="btn" onclick="changeColor()">Random Color</button>
  <button class="btn" onclick="resetGame()">Reset</button>
</div>

<script>
let score = 0;
let colors = ["#4a90e2", "#e24a4a", "#4ae24a", "#e2944a", "#9b4ae2", "#4ae2e2"];

function clickCircle() {
  score = score + 1;
  document.getElementById("score").innerHTML = "Score: " + score;

  if (score % 10 == 0) {
    document.getElementById("message").innerHTML = "🔥 " + score + " clicks! You're on fire!";
  } else if (score % 5 == 0) {
    document.getElementById("message").innerHTML = "⭐ " + score + " clicks! Keep going!";
  } else {
    document.getElementById("message").innerHTML = "👍 " + score + " clicks!";
  }

  changeColor();
}

function changeColor() {
  let randomColor = colors[Math.floor(Math.random() * colors.length)];
  document.getElementById("circle").style.background = randomColor;
}

function resetGame() {
  score = 0;
  document.getElementById("score").innerHTML = "Score: 0";
  document.getElementById("message").innerHTML = "Click the circle to start!";
  document.getElementById("circle").style.background = "#4a90e2";
}
</script>

</body>
</html>
