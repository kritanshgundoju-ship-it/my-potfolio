<!DOCTYPE html>
<html>
<head>
<title>Contact Book</title>
<style>
body { background: #f0f4ff; font-family: Arial; display: flex; justify-content: center; padding: 40px; }
.card { background: white; padding: 40px; border-radius: 16px; width: 400px; }
h1 { color: #4a90e2; text-align: center; }
.contact { background: #f0f4ff; border-radius: 10px; padding: 14px 18px; margin: 10px 0; }
.contact-name { font-size: 17px; font-weight: bold; color: #4a90e2; }
.contact-info { font-size: 14px; color: #555; line-height: 1.8; }
button { background: #4a90e2; color: white; padding: 10px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 10px; }
</style>
</head>
<body>
<div class="card">
  <h1>Contact Book</h1>
  <div id="contacts"></div>
  <button onclick="showContacts()">Load Contacts</button>
</div>

<script>
let contacts = [
  { name: "John", age: 17, city: "Hyderabad", hobby: "Coding" },
  { name: "Sara", age: 16, city: "Mumbai", hobby: "Painting" },
  { name: "Ravi", age: 18, city: "Delhi", hobby: "Gaming" },
  { name: "Priya", age: 17, city: "Chennai", hobby: "Reading" }
];

function showContacts() {
  let result = "";

  for (let i = 0; i < contacts.length; i++) {
    let c = contacts[i];
    result = result +
      "<div class='contact'>" +
      "<div class='contact-name'>" + c.name + "</div>" +
      "<div class='contact-info'>" +
      "Age: " + c.age + "<br>" +
      "City: " + c.city + "<br>" +
      "Hobby: " + c.hobby +
      "</div></div>";
  }

  document.getElementById("contacts").innerHTML = result;
}
</script>

</body>
</html>
